name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: rag_platform_test }
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: pip install -r api/requirements.txt -r eval/requirements.txt ruff pytest
      - name: Lint
        run: ruff check api/app worker
      - name: Run unit tests
        run: pytest api/tests -v
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/rag_platform_test
          JWT_SECRET: test-secret
          REDIS_URL: redis://localhost:6379/0

  ragas-eval:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install eval dependencies
        run: pip install -r eval/requirements.txt
      - name: Run RAGAS regression check
        run: python eval/ragas_eval.py
        env:
          EVAL_PROJECT_ID: ${{ secrets.EVAL_PROJECT_ID }}
          EVAL_TOKEN: ${{ secrets.EVAL_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f api/Dockerfile -t rag-platform-api:${{ github.sha }} .
      - name: Build worker image
        run: docker build -f worker/Dockerfile -t rag-platform-worker:${{ github.sha }} .
      # Push step intentionally omitted — wire in your registry (GHCR/ECR/GCR)
      # and credentials via repo secrets before enabling this in production.
